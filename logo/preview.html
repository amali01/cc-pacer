<title>cc-pacer — logo</title>
<style>
  :root {
    --bg: #FBFCFD;
    --panel: #FFFFFF;
    --ink: #1B1F23;
    --slate: #6E7781;
    --line: #E4E8EC;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: "Segoe UI", system-ui, -apple-system, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0D1117; --panel:#161B22; --ink:#E6EDF3; --slate:#8B949E; --line:#21262D; }
  }
  :root[data-theme="light"] { --bg:#FBFCFD; --panel:#FFFFFF; --ink:#1B1F23; --slate:#6E7781; --line:#E4E8EC; }
  :root[data-theme="dark"]  { --bg:#0D1117; --panel:#161B22; --ink:#E6EDF3; --slate:#8B949E; --line:#21262D; }

  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--sans); line-height: 1.5;
    display: flex; flex-direction: column; align-items: center;
    gap: 2.5rem; padding: 3.5rem 1.5rem 4rem;
  }
  .lockup { display: flex; align-items: center; gap: 1.1rem; }
  .lockup svg { width: 132px; height: auto; color: var(--ink); }
  .wordmark { display: flex; flex-direction: column; gap: .35rem; }
  .name { font-family: var(--mono); font-size: 2.9rem; font-weight: 700; letter-spacing: -.02em; line-height: 1; }
  .name .cc { color: var(--slate); }
  .name .pacer { color: var(--ink); }
  .slogan { font-size: .95rem; color: var(--slate); letter-spacing: .01em; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
          gap: 1rem; width: 100%; max-width: 720px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
          padding: 1.5rem; display: flex; flex-direction: column; align-items: center;
          gap: 1rem; }
  .card svg { color: var(--ink); }
  .cap { font-family: var(--mono); font-size: .72rem; color: var(--slate);
         text-transform: uppercase; letter-spacing: .09em; }

  /* statusline preview */
  .statusline { font-family: var(--mono); font-size: .82rem; background: #0D1117; color:#C9D1D9;
    border:1px solid #21262D; border-radius: 8px; padding: .55rem .85rem; display:flex;
    align-items:center; gap:.6rem; max-width: 720px; width:100%; overflow-x:auto; }
  .statusline svg { flex: none; }
  .statusline .g { color:#3FB950; } .statusline .a { color:#E3B341; } .statusline .r { color:#F85149; }
  .statusline .dim { color:#6E7781; }
</style>

<div class="lockup">
  <svg viewBox="0 0 200 150" aria-label="cc-pacer mark">
    <g fill="none" stroke-width="13" stroke-linecap="butt">
      <path d="M 15 115 A 85 85 0 0 1 122.0 32.9" stroke="#3FB950"/>
      <path d="M 122.0 32.9 A 85 85 0 0 1 169.6 66.2" stroke="#E3B341"/>
      <path d="M 169.6 66.2 A 85 85 0 0 1 185 115" stroke="#F85149"/>
    </g>
    <line x1="185" y1="115" x2="199" y2="115" stroke="#F85149" stroke-width="4" stroke-linecap="round"/>
    <line x1="100" y1="115" x2="148.2" y2="61.5" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
    <circle cx="100" cy="115" r="9" fill="currentColor"/>
    <circle cx="100" cy="115" r="3.5" fill="#3FB950"/>
  </svg>
  <div class="wordmark">
    <div class="name"><span class="cc">cc-</span><span class="pacer">pacer</span></div>
    <div class="slogan">Know your pace before you hit the wall.</div>
  </div>
</div>

<div class="grid">
  <div class="card">
    <svg width="96" height="72" viewBox="0 0 200 150" aria-label="mark only">
      <g fill="none" stroke-width="13" stroke-linecap="butt">
        <path d="M 15 115 A 85 85 0 0 1 122.0 32.9" stroke="#3FB950"/>
        <path d="M 122.0 32.9 A 85 85 0 0 1 169.6 66.2" stroke="#E3B341"/>
        <path d="M 169.6 66.2 A 85 85 0 0 1 185 115" stroke="#F85149"/>
      </g>
      <line x1="185" y1="115" x2="199" y2="115" stroke="#F85149" stroke-width="4" stroke-linecap="round"/>
      <line x1="100" y1="115" x2="148.2" y2="61.5" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
      <circle cx="100" cy="115" r="9" fill="currentColor"/>
      <circle cx="100" cy="115" r="3.5" fill="#3FB950"/>
    </svg>
    <span class="cap">app icon</span>
  </div>
  <div class="card">
    <svg width="40" height="30" viewBox="0 0 200 150" aria-label="favicon size">
      <g fill="none" stroke-width="15" stroke-linecap="butt">
        <path d="M 15 115 A 85 85 0 0 1 122.0 32.9" stroke="#3FB950"/>
        <path d="M 122.0 32.9 A 85 85 0 0 1 169.6 66.2" stroke="#E3B341"/>
        <path d="M 169.6 66.2 A 85 85 0 0 1 185 115" stroke="#F85149"/>
      </g>
      <line x1="100" y1="115" x2="148.2" y2="61.5" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
      <circle cx="100" cy="115" r="11" fill="currentColor"/>
    </svg>
    <span class="cap">16px favicon</span>
  </div>
</div>

<div class="statusline" aria-label="statusline preview">
  <svg width="26" height="19" viewBox="0 0 200 150">
    <g fill="none" stroke-width="15" stroke-linecap="butt">
      <path d="M 15 115 A 85 85 0 0 1 122.0 32.9" stroke="#3FB950"/>
      <path d="M 122.0 32.9 A 85 85 0 0 1 169.6 66.2" stroke="#E3B341"/>
      <path d="M 169.6 66.2 A 85 85 0 0 1 185 115" stroke="#F85149"/>
    </g>
    <line x1="100" y1="115" x2="148.2" y2="61.5" stroke="#C9D1D9" stroke-width="8" stroke-linecap="round"/>
    <circle cx="100" cy="115" r="11" fill="#C9D1D9"/>
  </svg>
  <span class="dim">main ↑2↓0</span>
  <span class="g">▇▇▇</span><span class="a">▇▇</span><span class="dim">░░</span>
  <span>68% · <span class="a">on pace</span></span>
</div>
