<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" role="img" aria-label="cc-pacer logo">
  <title>cc-pacer</title>
  <!-- gauge track: green -> amber -> red (usage pace) -->
  <g fill="none" stroke-width="13" stroke-linecap="butt">
    <!-- green: 180deg -> 75deg -->
    <path d="M 15 115 A 85 85 0 0 1 122.0 32.9" stroke="#3FB950"/>
    <!-- amber: 75deg -> 35deg -->
    <path d="M 122.0 32.9 A 85 85 0 0 1 169.6 66.2" stroke="#E3B341"/>
    <!-- red: 35deg -> 0deg -->
    <path d="M 169.6 66.2 A 85 85 0 0 1 185 115" stroke="#F85149"/>
  </g>
  <!-- "the wall": tick at the red limit -->
  <line x1="185" y1="115" x2="199" y2="115" stroke="#F85149" stroke-width="4" stroke-linecap="round"/>
  <!-- needle: climbing into amber (know your pace before the wall) -->
  <g stroke="#1B1F23" stroke-linecap="round">
    <line x1="100" y1="115" x2="148.2" y2="61.5" stroke-width="6"/>
  </g>
  <circle cx="100" cy="115" r="9" fill="#1B1F23"/>
  <circle cx="100" cy="115" r="3.5" fill="#3FB950"/>
</svg>
